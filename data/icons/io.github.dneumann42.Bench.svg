<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#1a2035"/>

  <!-- Monitor frame -->
  <rect x="20" y="14" width="88" height="56" rx="6" fill="#0d1423"/>
  <!-- Screen -->
  <rect x="24" y="18" width="80" height="48" rx="3" fill="#111c38"/>

  <!-- Code lines: keyword + identifier -->
  <rect x="30" y="26" width="14" height="4" rx="2" fill="#c792ea"/>
  <rect x="48" y="26" width="22" height="4" rx="2" fill="#82aaff"/>
  <rect x="74" y="26" width="10" height="4" rx="2" fill="#89ddff"/>
  <!-- string literal -->
  <rect x="30" y="35" width="8"  height="4" rx="2" fill="#c3e88d"/>
  <rect x="42" y="35" width="30" height="4" rx="2" fill="#f07178"/>
  <!-- comment -->
  <rect x="30" y="44" width="50" height="4" rx="2" fill="#546e7a"/>
  <!-- another line -->
  <rect x="30" y="53" width="18" height="4" rx="2" fill="#c792ea"/>
  <rect x="52" y="53" width="14" height="4" rx="2" fill="#ffcb6b"/>
  <rect x="70" y="53" width="6"  height="4" rx="2" fill="#89ddff"/>

  <!-- Monitor stand post -->
  <rect x="61" y="70" width="6" height="8" rx="1" fill="#0d1423"/>
  <!-- Monitor stand base -->
  <rect x="48" y="76" width="32" height="5" rx="2" fill="#0d1423"/>

  <!-- Workbench surface -->
  <rect x="10" y="80" width="108" height="13" rx="4" fill="#f5a623"/>

  <!-- Left leg -->
  <rect x="20" y="93" width="12" height="28" rx="3" fill="#c07810"/>
  <!-- Right leg -->
  <rect x="96" y="93" width="12" height="28" rx="3" fill="#c07810"/>
  <!-- Crossbar -->
  <rect x="20" y="110" width="88" height="7" rx="3" fill="#c07810"/>
</svg>
