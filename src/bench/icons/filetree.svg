  <line x1="3" y1="12" x2="6" y2="12"/>
  <!-- file nodes -->
  <rect x="6" y="4.5" width="7" height="3" rx="0.5" fill="currentColor" stroke="none"/>
  <rect x="6" y="7.5" width="5" height="3" rx="0.5" fill="currentColor" stroke="none"/>
  <rect x="6" y="10.5" width="6" height="3" rx="0.5" fill="currentColor" stroke="none"/>
</svg>
