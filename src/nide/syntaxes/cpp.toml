id = "cpp"
engine = "regex"
extensions = [".c", ".cc", ".cpp", ".cxx", ".h", ".hh", ".hpp", ".hxx"]

[[rules]]
pattern = '\b(?:if|else|switch|case|default|for|while|do|break|continue|return|goto|try|catch|throw)\b'
kind = "controlFlow"

[[rules]]
pattern = '\b(?:class|struct|enum|namespace|template|typename|typedef|using|public|private|protected|virtual|override|final|constexpr|consteval|constinit|friend|static|inline|extern|mutable|volatile|register|operator|sizeof|alignas|alignof|decltype|concept|requires|module|import|export|new|delete|this)\b'
kind = "keyword"

[[rules]]
pattern = '\b(?:void|bool|char|wchar_t|char8_t|char16_t|char32_t|short|int|long|float|double|signed|unsigned|size_t|ptrdiff_t|auto|nullptr|true|false)\b'
kind = "builtinType"

[[rules]]
pattern = '\b[A-Za-z_]\w*(?=\s*\()'
kind = "funcName"

[[rules]]
pattern = '(?m)^[ \t]*#[ \t]*[A-Za-z_]\w*'
kind = "pragma"

[[rules]]
pattern = '\b(?:0[xX][0-9A-Fa-f''_]+|0[bB][01''_]+|\d+(?:\.\d+)?(?:[eE][+-]?\d+)?(?:[uUlLfF]|ll|LL)*)\b'
kind = "number"

[[rules]]
pattern = '[+\-*/%=&|!<>^~?:]+'
kind = "operator"

[[rules]]
pattern = '''"(?:\\.|[^"\\])*"'''
kind = "string"

[[rules]]
pattern = ''''(?:\\.|[^'\\])*''''
kind = "charLit"

[[rules]]
pattern = '(?s)/\*.*?\*/'
kind = "blockComment"

[[rules]]
pattern = '//[^\n]*'
kind = "comment"
