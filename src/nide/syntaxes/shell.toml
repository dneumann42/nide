id = "shell"
engine = "regex"
extensions = [".sh", ".bash", ".zsh"]

[[rules]]
pattern = '\b(?:if|then|else|elif|fi|for|in|do|done|while|until|case|esac|function|select|time)\b'
kind = "controlFlow"

[[rules]]
pattern = '\b(?:export|local|readonly|declare|typeset|unset|return|shift|break|continue)\b'
kind = "keyword"

[[rules]]
pattern = '\$[A-Za-z_][A-Za-z0-9_]*|\$\{[^}]+\}'
kind = "specialVar"

[[rules]]
pattern = '\b[A-Za-z_][A-Za-z0-9_]*(?=\s*\()'
kind = "funcName"

[[rules]]
pattern = '\b(?:0[xX][0-9A-Fa-f_]+|\d+)\b'
kind = "number"

[[rules]]
pattern = '''"(?:\\.|[^"\\])*"'''
kind = "string"

[[rules]]
pattern = ''''(?:\\.|[^'\\])*''''
kind = "string"

[[rules]]
pattern = '#[^\n]*'
kind = "comment"
