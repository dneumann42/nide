id = "sushi"
engine = "regex"
extensions = [".sushi"]

[[rules]]
pattern = '\b(?:do|end|if|elif|else|fn|fun|while)\b'
kind = "controlFlow"

[[rules]]
pattern = '\b(?:var|set|use|class)\b'
kind = "keyword"

[[rules]]
pattern = '(?<![A-Za-z0-9_-]):[A-Za-z_][A-Za-z0-9_-]*'
kind = "specialVar"

[[rules]]
pattern = '\b(?:not|and|or|eq|not-eq)\b'
kind = "operator"

[[rules]]
pattern = '\b(?:T|F)\b'
kind = "builtinType"

[[rules]]
pattern = '\b\d+(?:\.\d+)?\b'
kind = "number"

[[rules]]
pattern = '(?m)(?:^|[\n\[])\s*((?!do\b|end\b|if\b|elif\b|else\b|fn\b|fun\b|while\b)[A-Za-z_][A-Za-z0-9_-]*)'
kind = "funcName"

[[rules]]
pattern = '(?<![A-Za-z0-9_-])(?:\?\?|!!|[-+*/%^<>=:@~.$&!?]+)(?![A-Za-z0-9_-])'
kind = "operator"

[[rules]]
pattern = '''"(?:\\.|[^"\\])*"'''
kind = "string"

[[rules]]
pattern = ';[^\n]*'
kind = "comment"
