id = "toml"
engine = "regex"
extensions = [".toml"]

[[rules]]
pattern = '(?m)^[ \t]*\[[^\]\n]+\]'
kind = "pragma"

[[rules]]
pattern = '(?m)^[ \t]*[A-Za-z0-9_.-]+(?=\s*=)'
kind = "funcName"

[[rules]]
pattern = '\b(?:true|false)\b'
kind = "builtinType"

[[rules]]
pattern = '\b(?:0[xX][0-9A-Fa-f_]+|\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)\b'
kind = "number"

[[rules]]
pattern = '''"(?:\\.|[^"\\])*"'''
kind = "string"

[[rules]]
pattern = '#[^\n]*'
kind = "comment"
