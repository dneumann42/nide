name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Linux binary tarball ─────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: nimble-linux-${{ hashFiles('nimble.lock') }}
          restore-keys: nimble-linux-

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.8'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.3'
          host: linux
          target: desktop
          arch: gcc_64
          cache: true

      - name: Install system deps and set pkg-config path
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config libgl1-mesa-dev libglib2.0-dev libdbus-1-dev patchelf
          find ${QT_ROOT_DIR}/lib/pkgconfig -name "*.pc" \
            -exec sed -i "s|^prefix=.*|prefix=${QT_ROOT_DIR}|" {} \;
          echo "PKG_CONFIG_PATH=${QT_ROOT_DIR}/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install nimble deps
        run: nimble install -d -y

      - name: Build nide
        run: nimble build -d:release

      - name: Bundle ripgrep
        run: nimble fetchrg

      - name: Package tarball
        run: |
          DEST=nide-${{ github.ref_name }}-linux-x64
          mkdir -p $DEST/lib $DEST/plugins

          cp nide $DEST/.nide-wrapped
          cp rg   $DEST/rg

          # Only the Qt6 shared libraries the binary actually needs (direct deps
          # plus transitive deps required by platform plugins).
          for lib in \
            Core Gui Widgets Svg SvgWidgets Network DBus OpenGL \
            WaylandClient WaylandEglClientHwIntegration WlShellIntegration \
            XcbQpa EglFSDeviceIntegration; do
            cp -P ${QT_ROOT_DIR}/lib/libQt6${lib}.so* $DEST/lib/ 2>/dev/null || true
          done
          cp -P ${QT_ROOT_DIR}/lib/libicu*.so* $DEST/lib/ 2>/dev/null || true

          # Qt plugins needed at runtime
          for dir in platforms imageformats xcbglintegrations platformthemes tls \
                     wayland-shell-integration wayland-decoration-client \
                     wayland-graphics-integration-client; do
            if [ -d "${QT_ROOT_DIR}/plugins/$dir" ]; then
              cp -r ${QT_ROOT_DIR}/plugins/$dir $DEST/plugins/
            fi
          done

          # Wrapper script — the only user-facing executable
          printf '#!/bin/sh\nHERE="$(dirname "$(readlink -f "$0")")"\nexport LD_LIBRARY_PATH="$HERE/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"\nexport QT_PLUGIN_PATH="$HERE/plugins"\nexec "$HERE/.nide-wrapped" "$@"\n' > $DEST/nide
          chmod +x $DEST/nide

          tar -czf $DEST.tar.gz $DEST/

      - uses: softprops/action-gh-release@v2
        with:
          files: nide-${{ github.ref_name }}-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

