  # ── Flatpak ──────────────────────────────────────────────────────────────────
  build-flatpak:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: nimble-linux-${{ hashFiles('nimble.lock') }}
          restore-keys: nimble-linux-

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-kde-6.10

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.8'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.3'
          host: linux
          target: desktop
          arch: gcc_64
          cache: true

      - name: Install system deps and set pkg-config path
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config flatpak flatpak-builder patchelf librsvg2-bin \
            libgl1-mesa-dev libglib2.0-dev elfutils libpcre3-dev
          find ${QT_ROOT_DIR}/lib/pkgconfig -name "*.pc" \
            -exec sed -i "s|^prefix=.*|prefix=${QT_ROOT_DIR}|" {} \;
          echo "PKG_CONFIG_PATH=${QT_ROOT_DIR}/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install nimble deps
        run: nimble install -d -y

      - name: Build nide binary (patchelf'd for flatpak runtime)
        run: |
          nimble build -d:release --dynlibOverride:pcre --passL:"-Wl,-Bstatic,-lpcre,-Bdynamic"
          patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 nide
          patchelf --set-rpath "" nide

      - name: Convert icon SVG to PNG
        run: |
          rsvg-convert -w 128 -h 128 \
            data/icons/io.github.dneumann42.Nide.svg \
            -o data/icons/io.github.dneumann42.Nide.png

      - name: Add Flathub and install KDE runtime
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user --noninteractive flathub \
            org.kde.Platform//6.10 org.kde.Sdk//6.10

      - name: Build flatpak
        run: |
          flatpak-builder \
            --force-clean \
            --disable-rofiles-fuse \
            --user \
            --install-deps-from=flathub \
            --repo=.flatpak-repo \
            .flatpak-build \
            flatpak/io.github.dneumann42.Nide.yml

      - name: Bundle nide.flatpak
        run: |
          flatpak build-bundle \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo \
            .flatpak-repo \
            nide-${{ github.ref_name }}.flatpak \
            io.github.dneumann42.Nide

      - uses: softprops/action-gh-release@v2
        with:
          files: nide-${{ github.ref_name }}.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
