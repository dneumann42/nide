name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Linux binary tarball ─────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: nimble-linux-${{ hashFiles('nimble.lock') }}
          restore-keys: nimble-linux-

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.6'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.3'
          host: linux
          target: desktop
          arch: gcc_64
          cache: true

      - name: Install system deps and set pkg-config path
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config libgl1-mesa-dev libglib2.0-dev libdbus-1-dev patchelf
          find ${QT_ROOT_DIR}/lib/pkgconfig -name "*.pc" \
            -exec sed -i "s|^prefix=.*|prefix=${QT_ROOT_DIR}|" {} \;
          echo "PKG_CONFIG_PATH=${QT_ROOT_DIR}/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install nimble deps
        run: nimble install -d -y

      - name: Build nide
        run: nimble build -d:release

      - name: Bundle ripgrep
        run: nimble fetchrg

      - name: Package tarball
        run: |
          DEST=nide-${{ github.ref_name }}-linux-x64
          mkdir -p $DEST/lib $DEST/plugins

          cp nide $DEST/nide.bin
          cp rg   $DEST/rg

          # Qt6 shared libraries
          cp -P ${QT_ROOT_DIR}/lib/libQt6*.so* $DEST/lib/
          cp -P ${QT_ROOT_DIR}/lib/libicu*.so* $DEST/lib/ 2>/dev/null || true

          # Qt plugins needed at runtime
          for dir in platforms imageformats xcbglintegrations platformthemes tls; do
            if [ -d "${QT_ROOT_DIR}/plugins/$dir" ]; then
              cp -r ${QT_ROOT_DIR}/plugins/$dir $DEST/plugins/
            fi
          done

          # Wrapper script
          printf '#!/bin/sh\nHERE="$(dirname "$(readlink -f "$0")")"\nexport LD_LIBRARY_PATH="$HERE/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"\nexport QT_PLUGIN_PATH="$HERE/plugins"\nexec "$HERE/nide.bin" "$@"\n' > $DEST/nide
          chmod +x $DEST/nide

          tar -czf $DEST.tar.gz $DEST/

      - uses: softprops/action-gh-release@v2
        with:
          files: nide-${{ github.ref_name }}-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Windows zip ─────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: nimble-windows-${{ hashFiles('nimble.lock') }}
          restore-keys: nimble-windows-

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.6'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.3'
          host: windows
          target: desktop
          arch: win64_mingw
          cache: true

      - name: Set Qt pkg-config path
        shell: pwsh
        run: |
          $qtRoot = $env:QT_ROOT_DIR -replace '\\', '/'
          $pcDir  = "$qtRoot/lib/pkgconfig"

          # Patch .pc file prefixes (aqtinstall doesn't fix them)
          Get-ChildItem ($pcDir -replace '/', '\') -Filter "*.pc" -ErrorAction SilentlyContinue |
            ForEach-Object {
              (Get-Content $_.FullName -Raw) -replace '(?m)^prefix=.*', "prefix=$qtRoot" |
                Set-Content $_.FullName -NoNewline
            }
          Add-Content $env:GITHUB_ENV "PKG_CONFIG_PATH=$pcDir"

          # MSYS2 pkgconf is a real .exe that outputs LF (not CRLF).
          # Must run from its actual MSYS2 location so msys-2.0.dll resolves.
          # MSYS2 base does not include gcc/g++ so adding usr/bin won't shadow Nim.
          C:\msys64\usr\bin\pacman.exe -S --noconfirm --needed pkgconf
          Add-Content $env:GITHUB_PATH "C:\msys64\usr\bin"

      - name: Install OpenSSL
        run: choco install openssl --no-progress -y

      - name: Install nimble deps
        run: nimble install -d -y

      - name: Bundle ripgrep
        run: nimble fetchrg

      - name: Build nide.exe
        run: nimble build -d:release

      - name: Bundle Qt DLLs and runtime DLLs
        shell: pwsh
        run: |
          windeployqt --release --no-translations nide.exe

          New-Item -ItemType Directory -Path release-win

          Copy-Item nide.exe release-win\
          Copy-Item rg.exe  release-win\

          # Qt DLLs placed by windeployqt
          Get-ChildItem -Path . -Filter *.dll | Copy-Item -Destination release-win\
          foreach ($dir in @("platforms","imageformats","styles","tls","iconengines")) {
            if (Test-Path $dir) { Copy-Item $dir release-win\ -Recurse }
          }

          # MinGW runtime DLLs — found dynamically from whichever gcc is in PATH
          $gccExe = (Get-Command gcc -ErrorAction SilentlyContinue)?.Source
          if ($gccExe) {
            $mingwBin = Split-Path $gccExe
            foreach ($dll in @("libgcc_s_seh-1.dll","libstdc++-6.dll","libwinpthread-1.dll")) {
              $dllPath = Join-Path $mingwBin $dll
              if (Test-Path $dllPath) { Copy-Item $dllPath release-win\ }
            }
          }

          # OpenSSL DLLs
          $opensslDir = "C:\Program Files\OpenSSL-Win64\bin"
          if (Test-Path $opensslDir) {
            Get-ChildItem "$opensslDir\libssl*.dll","$opensslDir\libcrypto*.dll" `
              -ErrorAction SilentlyContinue | Copy-Item -Destination release-win\
          }

          Compress-Archive -Path release-win\* `
            -DestinationPath "nide-${{ github.ref_name }}-windows-x64.zip"

      - uses: softprops/action-gh-release@v2
        with:
          files: nide-${{ github.ref_name }}-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Flatpak ──────────────────────────────────────────────────────────────────
  build-flatpak:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: nimble-linux-${{ hashFiles('nimble.lock') }}
          restore-keys: nimble-linux-

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-kde-6.10

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.6'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.3'
          host: linux
          target: desktop
          arch: gcc_64
          cache: true

      - name: Install system deps and set pkg-config path
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config flatpak flatpak-builder patchelf librsvg2-bin \
            libgl1-mesa-dev libglib2.0-dev elfutils libpcre3-dev
          find ${QT_ROOT_DIR}/lib/pkgconfig -name "*.pc" \
            -exec sed -i "s|^prefix=.*|prefix=${QT_ROOT_DIR}|" {} \;
          echo "PKG_CONFIG_PATH=${QT_ROOT_DIR}/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install nimble deps
        run: nimble install -d -y

      - name: Build nide binary (patchelf'd for flatpak runtime)
        run: |
          nimble build -d:release --dynlibOverride:pcre --passL:"-Wl,-Bstatic,-lpcre,-Bdynamic"
          patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 nide
          patchelf --set-rpath "" nide

      - name: Convert icon SVG to PNG
        run: |
          rsvg-convert -w 128 -h 128 \
            data/icons/io.github.dneumann42.Nide.svg \
            -o data/icons/io.github.dneumann42.Nide.png

      - name: Add Flathub and install KDE runtime
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user --noninteractive flathub \
            org.kde.Platform//6.10 org.kde.Sdk//6.10

      - name: Build flatpak
        run: |
          flatpak-builder \
            --force-clean \
            --disable-rofiles-fuse \
            --user \
            --install-deps-from=flathub \
            --repo=.flatpak-repo \
            .flatpak-build \
            flatpak/io.github.dneumann42.Nide.yml

      - name: Bundle nide.flatpak
        run: |
          flatpak build-bundle \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo \
            .flatpak-repo \
            nide-${{ github.ref_name }}.flatpak \
            io.github.dneumann42.Nide

      - uses: softprops/action-gh-release@v2
        with:
          files: nide-${{ github.ref_name }}.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
